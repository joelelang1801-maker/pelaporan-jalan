<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Laporan Saya</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .header {
            background: linear-gradient(to right, #0d6efd, #0b3d91);
            color: white;
            padding: 40px;
            border-radius: 0 0 20px 20px;
            text-align: center;
        }

        .card-table {
            margin-top: -40px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        img {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h2>Daftar Laporan</h2>
    <p>Sistem Pelaporan Jalan Rusak</p>
</div>

<div class="container">
    <div class="card card-table p-4">

        <!-- BUTTON -->
        <div class="d-flex justify-content-between mb-3">
            <a href="/user/lapor" class="btn btn-primary">
                + Tambah Laporan
            </a>

            <a href="/user/dashboard" class="btn btn-secondary">
                Kembali
            </a>
        </div>

        <!-- TABLE -->
        <div class="table-responsive">
            <table class="table table-hover align-middle">

                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Judul</th>
                        <th>Lokasi</th>
                        <th>Status</th>
                        <th>Tanggal</th>
                        <th>Foto</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="laporan : ${laporanList}">

                        <td th:text="${laporan.id}"></td>

                        <td th:text="${laporan.judul}"></td>

                        <td th:text="${laporan.lokasi}"></td>

                        <!-- STATUS BADGE -->
                        <td>
                            <span th:if="${laporan.status == 'MENUNGGU'}"
                                  class="badge bg-warning text-dark">Menunggu</span>

                            <span th:if="${laporan.status == 'DIPROSES'}"
                                  class="badge bg-primary">Diproses</span>

                            <span th:if="${laporan.status == 'SELESAI'}"
                                  class="badge bg-success">Selesai</span>
                        </td>

                        <td th:text="${laporan.tanggal}"></td>

                        <td>
                            <img th:src="@{'/uploads/' + ${laporan.foto}}"
                                 width="120">
                        </td>

                    </tr>
                </tbody>

            </table>
        </div>

    </div>
</div>

</body>
</html>
