<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Laporkan Jalan Rusak</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .header {
            background: linear-gradient(to right, #0d6efd, #0b3d91);
            color: white;
            padding: 40px;
            border-radius: 0 0 20px 20px;
            text-align: center;
        }

        .form-card {
            margin-top: -40px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn-custom {
            background: #0d6efd;
            color: white;
            border-radius: 10px;
        }

        .btn-custom:hover {
            background: #0b3d91;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h2>Form Pelaporan</h2>
    <p>Sistem Pelaporan Jalan Rusak</p>
</div>

<div class="container">
    <div class="card form-card p-4">

        <form th:action="@{/user/lapor}"
              th:object="${laporan}"
              method="post"
              enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Judul</label>
                <input type="text" class="form-control" th:field="*{judul}">
            </div>

            <div class="mb-3">
                <label class="form-label">Lokasi</label>
                <input type="text" class="form-control" th:field="*{lokasi}">
            </div>

            <div class="mb-3">
                <label class="form-label">Deskripsi</label>
                <textarea class="form-control" th:field="*{deskripsi}"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Foto Jalan Rusak</label>
                <input type="file" class="form-control" name="file">
            </div>

            <button type="submit" class="btn btn-custom w-100">
                Kirim Laporan
            </button>

        </form>

    </div>
</div>

</body>
</html>
