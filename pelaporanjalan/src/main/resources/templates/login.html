<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Login - Pelaporan Jalan Rusak</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:
    linear-gradient(
        135deg,
        #2563eb 0%,
        #1e3a8a 50%,
        #000000 100%
    );

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:'Segoe UI',sans-serif;
}

.login-card{

    width:450px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,0.2);

    border-radius:20px;

    padding:40px;

    color:white;

    box-shadow:
        0 10px 30px rgba(0,0,0,0.4);
}

.logo{

    font-size:60px;

    text-align:center;

    margin-bottom:10px;
}

.title{

    text-align:center;

    font-weight:bold;

    margin-bottom:5px;
}

.subtitle{

    text-align:center;

    color:#dbeafe;

    margin-bottom:30px;
}

.form-control{

    background:rgba(255,255,255,0.1);

    border:none;

    color:white;
}

.form-control:focus{

    background:rgba(255,255,255,0.15);

    color:white;

    box-shadow:none;

    border:1px solid #60a5fa;
}

.form-control::placeholder{
    color:#cbd5e1;
}

.btn-login{

    width:100%;

    background:#2563eb;

    border:none;

    padding:12px;

    font-weight:bold;

    border-radius:10px;

    transition:0.3s;
}

.btn-login:hover{

    background:#3b82f6;

    transform:translateY(-2px);
}

.register-link{

    text-align:center;

    margin-top:15px;
}

.register-link a{

    color:#93c5fd;

    text-decoration:none;
}

.register-link a:hover{

    color:white;
}

</style>

</head>
<body>

<div class="login-card">

```
<div class="logo">
    🚧
</div>

<h2 class="title">
    Pelaporan Jalan Rusak
</h2>

<p class="subtitle">
    Sistem Pelaporan Infrastruktur Jalan
</p>

<div th:if="${param.error}"
     class="alert alert-danger">

    Email atau Password salah
</div>

<form th:action="@{/login}" method="post">

    <div class="mb-3">

        <label>Email</label>

        <input
            type="email"
            name="username"
            class="form-control"
            placeholder="Masukkan Email"
            required>

    </div>

    <div class="mb-3">

        <label>Password</label>

        <input
            type="password"
            name="password"
            class="form-control"
            placeholder="Masukkan Password"
            required>

    </div>

    <button type="submit"
            class="btn btn-primary btn-login">

        Login

    </button>

</form>

<div class="register-link">

    Belum punya akun?

    <a th:href="@{/register}">
        Daftar Disini
    </a>

</div>
```

</div>

</body>
</html>
