<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard Admin</title>

```
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

    body{
        background:#f4f7fc;
    }

    .header{
        background:linear-gradient(135deg,#0d6efd,#000);
        color:white;
        padding:40px;
        border-radius:0 0 25px 25px;
    }

    .stat-card{
        border:none;
        border-radius:20px;
        color:white;
        transition:.3s;
    }

    .stat-card:hover{
        transform:translateY(-5px);
    }

    .blue{
        background:#0d6efd;
    }

    .orange{
        background:#fd7e14;
    }

    .green{
        background:#198754;
    }

    .dark{
        background:#212529;
    }

    .icon{
        font-size:45px;
    }

</style>
```

</head>
<body>

<div class="header text-center">

```
<h1>Dashboard Admin</h1>

<p>Sistem Pelaporan Jalan Rusak</p>
```

</div>

<div class="container mt-5">

```
<div class="row g-4">

    <div class="col-md-3">
        <div class="card stat-card blue p-4">
            <i class="bi bi-file-earmark-text icon"></i>
            <h3 th:text="${totalLaporan}">0</h3>
            <p>Total Laporan</p>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card stat-card orange p-4">
            <i class="bi bi-hourglass-split icon"></i>
            <h3 th:text="${menunggu}">0</h3>
            <p>Menunggu</p>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card stat-card dark p-4">
            <i class="bi bi-gear-fill icon"></i>
            <h3 th:text="${diproses}">0</h3>
            <p>Diproses</p>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card stat-card green p-4">
            <i class="bi bi-check-circle-fill icon"></i>
            <h3 th:text="${selesai}">0</h3>
            <p>Selesai</p>
        </div>
    </div>

</div>

<div class="text-center mt-5">

    <a href="/admin/laporan"
       class="btn btn-primary btn-lg">
        Kelola Laporan
    </a>

    <a href="/logout"
       class="btn btn-danger btn-lg">
        Logout
    </a>

</div>
```

</div>

</body>
</html>
